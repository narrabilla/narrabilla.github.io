<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- ===== SEO & social sharing =====
       These are STATIC on purpose: search engines and social-link scrapers
       (WhatsApp, Instagram, LinkedIn, Facebook) read the raw HTML and do NOT run
       JavaScript. Keep them roughly in sync with content.json > site if you rebrand. -->
  <title>Nabilla Zahrina — Voice Over Artist</title>
  <meta name="description" content="Bilingual Indonesian & English voice over with a warm, conversational tone — natural, genuine, and easy to listen to, for commercials, narration, e-learning and more." />
  <link rel="canonical" href="https://narrabilla.github.io/" />

  <!-- Open Graph (Facebook, WhatsApp, LinkedIn…) -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Nabilla Zahrina" />
  <meta property="og:title" content="Nabilla Zahrina — Voice Over Artist" />
  <meta property="og:description" content="Warm, conversational, bilingual voice over (Indonesian & English) for brands that want to sound genuine and approachable." />
  <meta property="og:url" content="https://narrabilla.github.io/" />
  <meta property="og:image" content="https://narrabilla.github.io/assets/img/og-image.jpg" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:locale" content="en_US" />

  <!-- Twitter / X -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Nabilla Zahrina — Voice Over Artist" />
  <meta name="twitter:description" content="Warm, conversational, bilingual voice over (Indonesian & English)." />
  <meta name="twitter:image" content="https://narrabilla.github.io/assets/img/og-image.jpg" />

  <!-- Structured data: tells Google this is a person / voice-over artist -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Person",
    "name": "Nabilla Zahrina",
    "jobTitle": "Voice Over Artist",
    "description": "Bilingual Indonesian & English voice over with a warm, conversational tone.",
    "url": "https://narrabilla.github.io/",
    "image": "https://narrabilla.github.io/assets/img/og-image.jpg",
    "email": "nabillazahrina@gmail.com",
    "knowsLanguage": ["id", "en"],
    "sameAs": ["https://instagram.com/narrabilla"]
  }
  </script>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Nunito+Sans:wght@400;600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <!-- ============================================================= -->
  <!--  All content is rendered from content.json by js/main.js.      -->
  <!--  To edit the site, change content.json — not this file.        -->
  <!-- ============================================================= -->

  <header class="nav" id="nav">
    <div class="container nav__inner" id="navInner"></div>
  </header>

  <main id="top">
    <section class="hero">
      <div class="container hero__inner" id="heroInner"></div>
    </section>

    <section class="section" id="about">
      <div class="container about" id="aboutInner"></div>
    </section>

    <section class="section section--alt" id="projects">
      <div class="container" id="projectsInner"></div>
    </section>

    <section class="section" id="samples">
      <div class="container" id="samplesInner"></div>
    </section>

    <section class="section section--alt" id="services">
      <div class="container" id="servicesInner"></div>
    </section>

    <section class="section" id="testimonials">
      <div class="container" id="whyInner"></div>
    </section>

    <section class="section section--alt" id="contact">
      <div class="container contact" id="contactInner"></div>
    </section>
  </main>

  <footer class="footer">
    <div class="container footer__inner" id="footerInner"></div>
  </footer>

  <noscript>
    <p style="text-align:center;padding:2rem;font-family:system-ui,sans-serif;">
      This portfolio needs JavaScript enabled to display its content.
    </p>
  </noscript>

  <script src="js/main.js"></script>
</body>
</html>
